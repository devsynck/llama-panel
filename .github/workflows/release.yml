name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Executable
        run: npm run build

      - name: Rename Executable (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: mv dist/llama-panel dist/llama-panel-${{ runner.os }}

      - name: Rename Executable (Windows)
        if: matrix.os == 'windows-latest'
        run: Rename-Item -Path dist\llama-panel.exe -NewName llama-panel-${{ runner.os }}.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/llama-panel-*
          name: Llama Panel ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
